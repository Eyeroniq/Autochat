name: AutoChat Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify FastAPI Import
        run: |
          cd backend
          python -c "import api"

      - name: Lint Check
        run: |
          echo "CI Pipeline Passed"